services:
  - type: web
    name: careermovechecker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: careermovechecker-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: careermovechecker-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: careermovechecker-db
          property: password
      - key: APP_BASE_URL
        value: https://careermovechecker.onrender.com

databases:
  - name: careermovechecker-db
    plan: starter
    postgresMajorVersion: "16"

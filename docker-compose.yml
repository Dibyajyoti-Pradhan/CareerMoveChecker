services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careermovechecker
      POSTGRES_USER: careermove
      POSTGRES_PASSWORD: careermove
    ports:
      - "5432:5432"
    volumes:
      - cmc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careermove -d careermovechecker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cmc-pgdata:
